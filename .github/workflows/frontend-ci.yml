# Mude de node:18-alpine para node:20-alpine
FROM node:20-alpine AS build

WORKDIR /app

# Copia arquivos de dependência
COPY package.json package-lock.json* ./

# IMPORTANTE: Remova package-lock.json e node_modules virtualmente
# e use npm install em vez de npm ci
RUN rm -f package-lock.json && npm install

# Copia o código fonte
COPY . .

# Força a reconstrução dos bindings nativos
RUN npm rebuild

# Build da aplicação
RUN npm run build

FROM nginx:alpine
COPY --from=build /app/dist /usr/share/nginx/html
EXPOSE 80
CMD ["nginx", "-g", "daemon off;"]
